apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: api-slo-rules
  namespace: demo
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: api-slo
      rules:
        - alert: ApiSLOErrorRateHigh
          expr: |
            (
              sum(rate(flask_http_request_total{namespace="demo",endpoint="http",status=~"5.."}[1m]))
              /
              sum(rate(flask_http_request_total{namespace="demo",endpoint="http"}[1m]))
            ) > 0.05
          for: 1m
          labels:
            severity: warning
            service: api
            slo: api-success-rate
          annotations:
            summary: "API SLO violation: high error rate"
            description: "API endpoint / has more than 5% HTTP 5xx responses for 1 minute. Current value: {{ $value | humanizePercentage }}."
